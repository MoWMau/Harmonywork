<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Berklee Harmony Workbook v2</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f8f6f0;--surf:#fff;--brd:#d4c9b0;--txt:#2a2520;--mut:#7a7060;--acc:#2563eb;--acl:#dbeafe;--ok:#16a34a;--err:#dc2626;--ph:118px;--hh:52px;--sw:248px}
body{font-family:Georgia,serif;background:var(--bg);color:var(--txt);font-size:18px}
#hdr{position:fixed;top:0;left:0;right:0;height:var(--hh);background:#1e3a5f;color:#fff;display:flex;align-items:center;padding:0 14px;gap:10px;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
#hdr h1{font-size:1rem;flex:1;line-height:1.3}
#hdr h1 small{font-size:.8rem;opacity:.65;font-weight:normal;display:block}
.hbtn{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);color:#fff;padding:4px 12px;border-radius:4px;cursor:pointer;font-size:.88rem}
.hbtn:hover{background:rgba(255,255,255,.3)}
#pgtx{font-size:.86rem;opacity:.8;white-space:nowrap}
#lay{display:flex;margin-top:var(--hh);margin-bottom:var(--ph);min-height:calc(100vh - var(--hh) - var(--ph))}
#sb{width:var(--sw);background:#f0ece0;border-right:1px solid var(--brd);overflow-y:auto;position:fixed;top:var(--hh);bottom:var(--ph);left:0;z-index:50}
.cbtn{display:block;width:100%;padding:9px 13px;text-align:left;border:none;background:transparent;cursor:pointer;font-size:.92rem;border-bottom:1px solid var(--brd);line-height:1.3;font-family:Georgia,serif;color:var(--txt)}
.cbtn:hover{background:#e5e0d0}
.cbtn.act{background:var(--acl);border-left:3px solid var(--acc);color:#1e40af;font-weight:bold}
.cbtn .pg{font-size:.78rem;color:var(--mut);display:block;margin-top:2px}
.cbtn .cp{float:right;font-size:.78rem;color:var(--mut)}
#mn{flex:1;margin-left:var(--sw);padding:16px 18px;max-width:860px}
.chdr{padding:6px 0 10px;border-bottom:2px solid var(--brd);margin-bottom:14px}
.chdr h2{font-size:1.3rem;color:#1e3a5f}
.chdr p{font-size:.95rem;color:var(--mut);margin-top:3px}
.pb{background:var(--surf);border:1px solid var(--brd);border-radius:7px;padding:18px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.pnum{font-size:.8rem;color:var(--mut);font-family:monospace;margin-bottom:6px}
.pq{font-size:1.08rem;margin-bottom:10px;line-height:1.6}
.pq .ko{display:block}
.pq .en{display:block;font-size:.95rem;color:var(--mut);margin-top:3px}
.sw{overflow-x:auto;margin:6px 0;background:#fff;border-radius:4px;border:1px solid #e8e0d0}
.ssv{display:block}
.ssv.ck{cursor:crosshair}
.pb.actv{border-color:var(--acc)!important;box-shadow:0 0 0 2.5px var(--acl);}
#pia_lbl{position:absolute;top:3px;left:8px;color:#94a3b8;font-size:.72rem;pointer-events:none;white-space:nowrap}
#pia{position:relative}
.nti{font-size:.95rem;font-family:monospace;padding:5px 9px;border:1.5px solid var(--brd);border-radius:4px;background:#fff;width:260px}
.nti:focus{outline:none;border-color:var(--acc)}
.abar{display:flex;gap:5px;margin:5px 0;align-items:center;flex-wrap:wrap}
.ab{width:36px;height:36px;border:1.5px solid var(--brd);border-radius:4px;background:#fff;cursor:pointer;font-size:1.2rem;display:flex;align-items:center;justify-content:center;font-family:"FreeSerif",serif;transition:.1s}
.ab:hover{background:var(--acl);border-color:var(--acc)}
.ab.sl{background:var(--acc);color:#fff;border-color:var(--acc)}
.ahl{font-size:.9rem;color:var(--mut)}
.ar{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap;align-items:center}
.btn{padding:7px 16px;border-radius:5px;border:none;cursor:pointer;font-size:.97rem;font-family:Georgia,serif;transition:.1s}
.bp{background:var(--acc);color:#fff}.bp:hover{background:#1d4ed8}
.bs{background:#f0ece0;border:1px solid var(--brd);color:var(--txt)}.bs:hover{background:#e5e0d0}
.bpl{background:#7c3aed;color:#fff}.bpl:hover{background:#6d28d9}
.bc{background:#fff;border:1px solid var(--brd);color:var(--mut)}.bc:hover{background:#f5f0e8}
.fb{margin-top:8px;padding:10px 14px;border-radius:5px;font-size:1rem;display:none}
.fok{background:#dcfce7;border:1px solid #86efac;color:#166534;display:block}
.fno{background:#fee2e2;border:1px solid #fca5a5;color:#991b1b;display:block}
.fin{background:var(--acl);border:1px solid #93c5fd;color:#1e40af;display:block}
.ai{padding:7px 11px;border:1.5px solid var(--brd);border-radius:5px;font-size:1rem;font-family:Georgia,serif;background:#fff;width:190px}
.ai:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 2px var(--acl)}
.mco{display:flex;flex-wrap:wrap;gap:5px;margin:6px 0}
.mo{padding:7px 16px;border:1.5px solid var(--brd);border-radius:14px;background:#fff;cursor:pointer;font-size:.97rem;transition:.1s;font-family:Georgia,serif}
.mo:hover{background:var(--acl);border-color:var(--acc)}
.mo.sl{background:var(--acc);color:#fff;border-color:var(--acc)}
.mo.ok{background:#dcfce7;border-color:#16a34a;color:#166534}
.mo.bad{background:#fee2e2;border-color:#dc2626;color:#991b1b}
.pnav{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-top:1px solid var(--brd);margin-top:12px}
#pia{position:fixed;bottom:0;left:0;right:0;height:var(--ph);background:#16213e;border-top:2px solid #2d3561;display:flex;align-items:center;justify-content:center;z-index:200;padding:6px 8px 4px;overflow:hidden}
#psvg{overflow-x:auto;overflow-y:hidden;max-width:100%}
#sb::-webkit-scrollbar{width:4px}
#sb::-webkit-scrollbar-thumb{background:var(--brd);border-radius:2px}
@media(max-width:680px){:root{--sw:0px}#sb{display:none}#mn{margin-left:0;padding:10px 12px}}

<body>
<div id="hdr">
  <h1>Berklee Harmony Workbook <small>버클리 화성학 워크북 인터랙티브 v2</small></h1>
  <span id="pgtx">0/0</span>
  <button class="hbtn" onclick="A.lang()">한/EN</button>
  <button class="hbtn" onclick="A.toggleSB()">☰</button>
</div>
<div id="lay">
  <aside id="sb"><div id="chl"></div></aside>
  <main id="mn">
    <div class="chdr"><h2 id="cht"></h2><p id="chd"></p></div>
    <div id="pbs"></div>
    <div class="pnav">
      <button class="btn bs" onclick="A.prev()">← 이전 챕터</button>
      <span id="pct" style="color:var(--mut);font-size:.84rem"></span>
      <button class="btn bs" onclick="A.next()">다음 챕터 →</button>
    </div>
  </main>
</div>
<div id="pia"><div id="pia_lbl">🎹 쓰기 문제의 오선을 클릭하면 건반 연동</div><div id="psvg"></div></div>
<script>
'use strict';
/* ═══════════════════════════════════════════════
   MUSIC THEORY ENGINE
═══════════════════════════════════════════════ */
const NL=['C','D','E','F','G','A','B'];
const SC={C:0,D:2,E:4,F:5,G:7,A:9,B:11};
function pn(s){const m=s.match(/^([A-G])([#b]*)(\d+)$/);if(!m)return null;return{n:m[1],a:m[2],o:+m[3]};}
function midi(s){const v=pn(s);if(!v)return null;let sm=SC[v.n];for(const c of v.a)sm+=c==='#'?1:-1;return 12*(v.o+1)+sm;}
function freq(s){const m=midi(s);return m?440*Math.pow(2,(m-69)/12):440;}
function ds(s){const v=pn(s);if(!v)return 0;return NL.indexOf(v.n)+(v.o-4)*7;}
function sy(step,cl){return cl==='bass'?50-5*step:110-5*step;}
function ys(y,cl){return cl==='bass'?Math.round((50-y)/5):Math.round((110-y)/5);}
function snn(step){const o=4+Math.floor(step>=0?Math.floor(step/7):(step-6)/7|0);const base=((step%7)+7)%7;return NL[base]+o;}
function leg(step,cl){const[lo,hi]=cl==='bass'?[-10,-2]:[2,10];const r=[];
  if(step<lo){for(let s=lo-2;s>=step-((step%2+2)%2);s-=2)r.push(s);}
  else if(step>hi){for(let s=hi+2;s<=step+((step%2+2)%2);s+=2)r.push(s);}
  return r;}
const ACC={'#':'♯','b':'♭','n':'♮','##':'𝄪','bb':'𝄫','':''};

/* ═══════════════════════════════════════════════
   WEB AUDIO
═══════════════════════════════════════════════ */
let AX=null;
function ax(){if(!AX)AX=new(window.AudioContext||window.webkitAudioContext)();if(AX.state==='suspended')AX.resume();return AX;}
function pnote(f,when=0,dur=0.65,vol=0.38){
  try{const c=ax(),t=c.currentTime+when;
  const o=c.createOscillator(),g=c.createGain();
  o.type='triangle';o.frequency.value=f;
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+0.022);
  g.gain.exponentialRampToValueAtTime(vol*.45,t+.1);g.gain.exponentialRampToValueAtTime(.001,t+dur);
  o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+dur);}catch(e){}
}
function play(ns,dl=0.18){ns.forEach((n,i)=>setTimeout(()=>pnote(freq(n),0,.6),i*dl*1000));}
function playchord(ns){ns.forEach(n=>pnote(freq(n),0,.9,.28));}
function flash(ns){ns.forEach((n,i)=>{setTimeout(()=>{
  const m=midi(n);if(!m)return;
  const el=document.querySelector(`[data-m="${m}"]`);
  if(el){el.classList.add('pk');setTimeout(()=>el.classList.remove('pk'),480);}
},i*160);});}

/* ═══════════════════════════════════════════════
   STAFF SVG
═══════════════════════════════════════════════ */
const KST=[10,7,11,8,5,9,6]; // treble sharp steps
const KSB=[8,5,9,6,3,7,4];  // bass sharp steps
const KFT=[6,9,5,8,4,7,3];  // treble flat steps
const KFB=[4,7,3,6,2,5,1];  // bass flat steps

function drawStaff(opt){
  const{cl='treble',ns=[],w=520,inter=false,id='',ks=0,kf=0}=opt;
  const H=200;let sx=54;
  // width+height 명시 → 브라우저 크기0 버그 방지
  let o=`<svg ${id?`id="${id}" `:''}width="${w}" height="${H}" viewBox="0 0 ${w} ${H}" class="ssv${inter?' ck':''}" xmlns="http://www.w3.org/2000/svg"${inter?` data-cl="${cl}" data-i="1"`:''}>`;
  o+=`<rect width="${w}" height="${H}" fill="white"/>`;
  for(let i=0;i<5;i++){const y=60+i*10;o+=`<line x1="8" y1="${y}" x2="${w-8}" y2="${y}" stroke="#1a1a1a" stroke-width="1.4"/>`;}
  if(cl==='treble'){
    // 높은음자리표: G선(y=90) 기준, font-size 키워서 선명하게
    o+=`<text x="5" y="120" font-size="110" font-family="Bravura,FreeSerif,Symbola,serif" fill="#1a1a1a">𝄞</text>`;
    sx=54;
  } else {
    // 낮은음자리표: F선(y=70) 기준
    o+=`<text x="7" y="84" font-size="62" font-family="Bravura,FreeSerif,Symbola,serif" fill="#1a1a1a">𝄢</text>`;
    sx=48;
  }
  if(ks>0){const arr=cl==='bass'?KSB:KST;for(let i=0;i<ks;i++){const y=sy(arr[i],cl);o+=`<text x="${sx+i*13}" y="${y+6}" font-size="16" font-family="FreeSerif,serif">♯</text>`;}sx+=ks*13+5;}
  if(kf>0){const arr=cl==='bass'?KFB:KFT;for(let i=0;i<kf;i++){const y=sy(arr[i],cl);o+=`<text x="${sx+i*13}" y="${y+5}" font-size="16" font-family="FreeSerif,serif">♭</text>`;}sx+=kf*13+5;}
  o+=`<line x1="${sx}" y1="60" x2="${sx}" y2="100" stroke="#1a1a1a" stroke-width="1.6"/>`;
  for(const n of ns)o+=drawNote(n,cl);
  o+='</svg>';return o;
}
function drawNote(n,cl){
  const{note,acc,color='#1a1a1a',style='whole',x=140}=typeof n==='object'?n:{note:n,acc:'',color:'#1a1a1a',style:'whole',x:140};
  const step=ds(note);const y=sy(step,cl);let o='';
  const ls=leg(step,cl);
  for(const l of ls){const ly=sy(l,cl);o+=`<line x1="${x-13}"y1="${ly}"x2="${x+13}"y2="${ly}"stroke="#1a1a1a"stroke-width="1.2"/>`;}
  const ra=acc||(pn(note)?.a||'');
  if(ra){const ac=ACC[ra]||ra;o+=`<text x="${x-17}"y="${y+5}"font-size="14"fill="${color}"font-family="FreeSerif,serif"text-anchor="middle">${ac}</text>`;}
  const mid=cl==='treble'?6:-4;const up=step<mid;
  // 모든 음표: 검정 채움 타원 (온음표도 포함)
  o+=`<ellipse cx="${x}"cy="${y}"rx="6.5"ry="4.5"fill="${color}"transform="rotate(-18,${x},${y})"/>`;
  if(style!=='whole'){
    const ex=up?x+6:x-6;o+=`<line x1="${ex}"y1="${y}"x2="${ex}"y2="${y+(up?-30:30)}"stroke="${color}"stroke-width="1.5"/>`;
  }
  return o;
}
function noteRow(ns,cl,opts={}){
  const sp=opts.sp||40,sx=opts.sx||80,w=Math.max(480,sx+ns.length*sp+60);
  return drawStaff({cl,ns:ns.map((n,i)=>({note:n,acc:'',color:opts.col||'#1a1a1a',style:opts.sty||'whole',x:sx+i*sp})),w,ks:opts.ks||0,kf:opts.kf||0});
}

/* ═══════════════════════════════════════════════
   PIANO
═══════════════════════════════════════════════ */
function mkPiano(){
  const WW=22,WH=80,BW=14,BH=48;
  const OCTS=[3,4,5];
  let whites=[],blacks=[],wi=0;
  for(const oct of OCTS){
    for(let d=0;d<7;d++){
      const note=NL[d]+oct,m=midi(note),x=wi*WW;
      whites.push(`<rect data-m="${m}"class="pkw"x="${x+1}"y="2"width="${WW-2}"height="${WH}"rx="2"fill="#fefefe"stroke="#888"stroke-width="1"style="cursor:pointer"onclick="A.pk('${note}')"/>`);
      if(d===0)whites.push(`<text x="${x+WW/2}"y="${WH-4}"text-anchor="middle"font-size="7"fill="#888"pointer-events="none">C${oct}</text>`);
      wi++;
    }
  }
  wi=0;
  for(const oct of OCTS){
    const hb=[1,1,0,1,1,1,0],bn=['C#','D#','','F#','G#','A#',''];
    for(let d=0;d<7;d++){
      if(hb[d]){const note=bn[d]+oct,m=midi(note),x=wi*WW+WW*.62;blacks.push(`<rect data-m="${m}"class="pkb"x="${x}"y="2"width="${BW}"height="${BH}"rx="2"fill="#1a1a1a"stroke="#333"stroke-width="1"style="cursor:pointer"onclick="A.pk('${note}')"/>`);}
      wi++;
    }
  }
  const tot=OCTS.length*7*WW+4;
  document.getElementById('psvg').innerHTML=`<svg width="${tot}"height="${WH+10}"xmlns="http://www.w3.org/2000/svg"style="display:block"><style>.pkw:hover{fill:#e8f4ff}.pk{fill:#93c5fd!important}.pkb:hover{fill:#334}.pkb.pk{fill:#1d4ed8!important}</style>${whites.join('')}${blacks.join('')}</svg>`;
}

/* ═══════════════════════════════════════════════
   SCALES DATABASE
═══════════════════════════════════════════════ */

const ST={};
let APID=null;
function setActive(pid){
  APID=pid;
  document.querySelectorAll('.pb.actv').forEach(e=>e.classList.remove('actv'));
  const pb=document.getElementById('pb_'+pid);if(pb)pb.classList.add('actv');
  const lbl=document.getElementById('pia_lbl');
  if(lbl)lbl.textContent='🎹 '+pid+' 연동 중 — 건반 클릭하면 오선에 입력';
}
function initIS(pid,cl,given,gx){
  if(!ST[pid])ST[pid]={pl:[],sa:'',cl};
  const el=document.getElementById('is_'+pid);
  if(!el)return;
  el.onclick=function(e){
    setActive(pid);
    const s=ST[pid];
    const r=el.getBoundingClientRect();
    const lx=(e.clientX-r.left)/r.width*600;
    const ly=(e.clientY-r.top)/r.height*200;
    const step=ys(ly,s.cl);
    const nn=snn(step);
    const ei=s.pl.findIndex(n=>ds(n.note)===step&&Math.abs(n.x-lx)<22);
    if(ei>=0){s.pl.splice(ei,1);}
    else{
      const px=Math.max(60,Math.round(lx/22)*22);
      const full=nn.slice(0,-1)+(s.sa||'')+nn.slice(-1);
      s.pl.push({note:nn,acc:s.sa||'',x:px,color:'#2563eb',style:'whole'});
      try{pnote(freq(full),0,.4);}catch(x){}
      const m=midi(full);if(m){const ke=document.querySelector('[data-m="'+m+'"]');if(ke){ke.classList.add('pk');setTimeout(()=>ke.classList.remove('pk'),460);}}
    }
    reIS(pid,cl,given,gx);
  };
}
function initSL(pid,ns,cl){
  if(!ST[pid])ST[pid]={sel:new Set(),cl,ns};
  const el=document.getElementById('sl_'+pid);if(!el)return;
  el.onclick=function(e){
    setActive(pid);
    const s=ST[pid];
    const r=el.getBoundingClientRect();
    const w=parseFloat(el.getAttribute('width'))||520;
    const lx=(e.clientX-r.left)/r.width*w;
    const sp=40,sx=78;
    let ci=-1,md=28;
    ns.forEach((n,i)=>{const nx=sx+i*sp;const d=Math.abs(lx-nx);if(d<md){md=d;ci=i;}});
    if(ci<0)return;
    if(s.sel.has(ci))s.sel.delete(ci);else s.sel.add(ci);
    reSL(pid,ns,cl);
    try{pnote(freq(ns[ci]),0,.4);}catch(x){}
    const m=midi(ns[ci]);if(m){const ke=document.querySelector('[data-m="'+m+'"]');if(ke){ke.classList.add('pk');setTimeout(()=>ke.classList.remove('pk'),460);}}
  };
}
function reSL(pid,ns,cl){
  const s=ST[pid];if(!s)return;
  const el=document.getElementById('sl_'+pid);if(!el)return;
  const sp=40,sx=78,w=Math.max(520,sx+ns.length*sp+60);
  const no=ns.map((n,i)=>({note:n,acc:'',color:s.sel.has(i)?'#16a34a':'#1a1a1a',style:'whole',x:sx+i*sp}));
  const nsvg=drawStaff({cl,ns:no,w,inter:true,id:'sl_'+pid});
  const tmp=document.createElement('div');tmp.innerHTML=nsvg;
  el.replaceWith(tmp.firstChild);
  initSL(pid,ns,cl);
}
function reIS(pid,cl,given,gx){
  const s=ST[pid];if(!s)return;
  const el=document.getElementById('is_'+pid);if(!el)return;
  const gNs=(given||[]).map((n,i)=>({note:n,acc:'',color:'#1a1a1a',style:'whole',x:(gx||80)+i*40}));
  const all=[...gNs,...s.pl];
  const nsvg=drawStaff({cl,ns:all,w:600,inter:true,id:'is_'+pid});
  const tmp=document.createElement('div');tmp.innerHTML=nsvg;
  el.replaceWith(tmp.firstChild);
  initIS(pid,cl,given,gx);
}

function shuf(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}
function oKs(ex,n=3){return shuf(['C major','G major','D major','A major','E major','F major','Bb major','Eb major','Ab major','Db major','F# major','A minor','E minor','B minor','D minor','G minor','C minor'].filter(k=>k!==ex)).slice(0,n);}
function oIn(ex,n=4){return shuf([ex,'P5','M3','m3','M6','m6','P4','M7','m7','A4','d5','m2','M2','P8','A5','d7']).slice(0,n);}
function oCh(ex,n=4){return shuf(['C major','D minor','E minor','F major','G major','A minor','B dim','C minor','D major','E major','F minor','G aug','D aug','C aug','Eb major','Bb major','Ab major'].filter(c=>c!==ex)).slice(0,n);}
function oMo(ex,n=4){return shuf([ex,'D dorian','G mixolydian','E phrygian','A lydian','B locrian','C aeolian','F dorian','Bb mixolydian','A phrygian','D mixolydian','C ionian','F lydian'].filter(m=>m!==ex)).slice(0,n);}

  /* ── CH 0: Pitch Recognition ── */

  });

   'A min pent','E min pent','G min pent','F min pent'].forEach(k=>{

  /* ── CH 5: Key Signatures ── */

  /* ── CH 9: Inversions ── */

let LG='ko',CH=0;
const DONE={};

function gps(ch){return ALL.filter(p=>p.ch===ch);}

function rSB(){
  let tot=0,dn=0;
  ALL.forEach(p=>{tot++;if(DONE[p.id])dn++;});
  document.getElementById('pgtx').textContent=`${dn}/${tot}`;
  const list=document.getElementById('chl');
  list.innerHTML=CHS.map((c,i)=>{
    const ps=gps(i),done=ps.filter(p=>DONE[p.id]).length;
    const ttl=LG==='ko'?c.t.split('/')[0]:c.t.split('/')[1]||c.t;
    return `<button class="cbtn${i===CH?' act':''}"onclick="A.gc(${i})">${ttl}<span class="pg">${LG==='ko'?c.d:c.de}</span><span class="cp">${done}/${ps.length}</span></button>`;
  }).join('');
}

function rProbs(){
  const c=CHS[CH],ps=gps(CH);
  document.getElementById('cht').textContent=LG==='ko'?c.t.split('/')[0]:c.t.split('/')[1]||c.t;
  document.getElementById('chd').textContent=LG==='ko'?c.d:c.de;
  const done=ps.filter(p=>DONE[p.id]).length;
  document.getElementById('pct').textContent=`${done}/${ps.length} ${LG==='ko'?'완료':'done'}`;
  if(!ps.length){document.getElementById('pbs').innerHTML='<div class="pb" style="color:var(--mut)">문제 없음</div>';return;}
  document.getElementById('pbs').innerHTML=ps.map(p=>rOne(p)).join('');
  // init write problems
  const wps=ps.filter(p=>p.type==='write');
  wps.forEach(p=>{
    const cl=p.clef||'treble';
    if(!ST[p.id])ST[p.id]={pl:[],sa:'',cl};
    initIS(p.id,cl,p.given||[],p.givenX||80);
  });
  // init select problems
  const sps=ps.filter(p=>p.type==='select');
  sps.forEach(p=>{
    const cl=p.clef||'treble';
    initSL(p.id,p.ns||[],cl);
  });
  const ap=[...wps,...sps];
  if(ap.length){setTimeout(()=>setActive(ap[0].id),80);}
}

function rOne(p){
  const q=p.q||{};
  const qh=`<div class="pq"><span class="ko">${q.ko||''}</span><span class="en">${q.en||''}</span></div>`;
  const num=`<div class="pnum">${p.id} · ch${p.ch+1}</div>`;
  const playBtn=(p.audio&&p.audio.length)?`<button class="btn bpl"onclick="A.pp('${p.id}')">▶ 듣기</button>`:'';
  let body='';
  if(p.type==='id')body=rID(p);
  else if(p.type==='mc')body=rMC(p);
  else if(p.type==='write')body=rWR(p);
  else if(p.type==='select')body=rSL(p);
  else if(p.type==='analyze')body=rAZ(p);
  return `<div class="pb"id="pb_${p.id}">${num}${qh}${body}<div class="ar">${playBtn}</div><div class="fb"id="fb_${p.id}"></div></div>`;
}

function rID(p){
  const sf=p.staff?`<div class="sw">${p.staff}</div>`:'';
  return sf+`<div class="ar"style="margin-top:8px">
    <input class="ai"id="ai_${p.id}"placeholder="${LG==='ko'?'답 입력...':'Answer...'}"onkeydown="if(event.key==='Enter')A.ck('${p.id}')"/>
    <button class="btn bp"onclick="A.ck('${p.id}')">확인</button>
    <button class="btn bs"onclick="A.sh('${p.id}')">힌트</button>
  </div>`;
}
function rMC(p){
  const sf=p.staff?`<div class="sw">${p.staff}</div>`:'';
  const opts=(p.opts||[]).map(o=>`<button class="mo"onclick="A.cm('${p.id}','${o.replace(/'/g,"\\'").replace(/"/g,'&quot;')}',this)">${o}</button>`).join('');
  return sf+`<div class="mco">${opts}</div>`;
}
function rWR(p){
  const cl=p.clef||'treble',giv=p.given||[],gx=p.givenX||80;
  if(!ST[p.id])ST[p.id]={pl:[],sa:'',cl};
  const s=ST[p.id];
  const gNs=giv.map((n,i)=>({note:n,acc:'',color:'#1a1a1a',style:'whole',x:gx+i*40}));
  const svg=drawStaff({cl,ns:[...gNs,...s.pl],w:600,inter:true,id:'is_'+p.id});
  const ab=['','#','b','##','bb','n'].map(a=>`<button class="ab${s.sa===a?' sl':''}"onclick="A.sa('${p.id}','${a}')"title="${a||'♮'}">${ACC[a]||'♮'}</button>`).join('');
  const ph=LG==='ko'?'음표명 띄어쓰기로 입력이로... (C4 D4 E4)':'note names space-separated (C4 D4 E4)';
  const lbni=LG==='ko'?'✏️ 직접 입력':'✏️ Type notes';
  const lbset=LG==='ko'?'오선에 입력':'Set on staff';
  return `<div class="sw">${svg}</div>
    <div class="abar"><span class="ahl">${LG==='ko'?'임시표:':'Acc:'}</span>${ab}
    <button class="btn bc"style="margin-left:6px"onclick="A.cl('${p.id}')">지우기</button>
    <button class="btn bp"onclick="A.cw('${p.id}')">확인/Check</button></div>
    <div class="abar"style="margin-top:4px;gap:6px">
      <span class="ahl">${lbni}:</span>
      <input class="nti"id="ni_${p.id}"placeholder="${ph}"onkeydown="if(event.key==='Enter'){A.nt('${p.id}');event.preventDefault();}"/>
      <button class="btn bs"onclick="A.nt('${p.id}')">${lbset}</button>
    </div>`;
}
function rSL(p){
  const ns=p.ns||[];const cl=p.clef||'treble';
  if(!ST[p.id])ST[p.id]={sel:new Set(),cl,ns};
  const s=ST[p.id];
  const sp=40,sx=78,w=Math.max(520,sx+ns.length*sp+60);
  const no=ns.map((n,i)=>({note:n,acc:'',color:s.sel.has(i)?'#16a34a':'#1a1a1a',style:'whole',x:sx+i*sp}));
  const svg=drawStaff({cl,ns:no,w,inter:true,id:'sl_'+p.id});
  const hint=LG==='ko'?'음표를 클릭하거나 건반으로 선택 (초록=선택됨)':'Click notes or use keyboard (green=selected)';
  return `<div class="sw">${svg}</div>`
    +`<div class="abar" style="margin-top:4px;gap:6px">`
    +`<span class="ahl">${hint}</span>`
    +`<button class="btn bc" onclick="A.clsl('${p.id}')">지우기</button>`
    +`<button class="btn bp" onclick="A.csl('${p.id}')">확인/Check</button>`
    +`</div>`;
}
function rAZ(p){
  const sf=p.staff?`<div class="sw">${p.staff}</div>`:'';
  if(p.opts&&p.opts.length){
    const opts=p.opts.map(o=>`<button class="mo"onclick="A.cm('${p.id}','${o.replace(/'/g,"\\'")}',this)">${o}</button>`).join('');
    return sf+`<div class="mco">${opts}</div>`;
  }
  return sf+`<div class="ar"style="margin-top:8px">
    <input class="ai"id="ai_${p.id}"placeholder="${LG==='ko'?'답 입력...':'Answer...'}"onkeydown="if(event.key==='Enter')A.ck('${p.id}')"/>
    <button class="btn bp"onclick="A.ck('${p.id}')">확인</button>
    <button class="btn bs"onclick="A.sh('${p.id}')">정답 보기</button>
  </div>`;
}

const A={
  init(){mkPiano();rSB();rProbs();this.lp();},
  gc(i){CH=i;rSB();rProbs();window.scrollTo(0,0);},
  prev(){if(CH>0){CH--;rSB();rProbs();window.scrollTo(0,0);}},
  next(){if(CH<CHS.length-1){CH++;rSB();rProbs();window.scrollTo(0,0);}},
  lang(){LG=LG==='ko'?'en':'ko';rSB();rProbs();},
  toggleSB(){const sb=document.getElementById('sb');sb.style.display=sb.style.display==='none'?'block':'none';},
  pk(note){
    pnote(freq(note));
    const m=midi(note);
    if(m){const el=document.querySelector(`[data-m="${m}"]`);if(el){el.classList.add('pk');setTimeout(()=>el.classList.remove('pk'),460);}}
    if(APID&&ST[APID]){
      const s=ST[APID];const p=ALL.find(x=>x.id===APID);if(!p)return;
      if(p.type==='select'){
        const ns=p.ns||s.ns||[];
        const em=midi(note);
        const ci=ns.findIndex(n=>midi(n)===em);
        if(ci>=0){if(s.sel.has(ci))s.sel.delete(ci);else s.sel.add(ci);
          reSL(APID,ns,s.cl||'treble');}
        return;
      }
      const cl=s.cl||'treble';
      const em=midi(note);
      const ei=s.pl.findIndex(n=>{
        const full=n.note.slice(0,-1)+(n.acc||'')+n.note.slice(-1);
        return midi(full)===em;
      });
      if(ei>=0){s.pl.splice(ei,1);}
      else{
        const gx=(p.givenX||80),gc=(p.given||[]).length;
        const nx=gx+gc*40+s.pl.length*40;
        s.pl.push({note,acc:'',x:nx,color:'#2563eb',style:'whole'});
      }
      reIS(APID,cl,p.given||[],p.givenX||80);
    }
  },
  pp(pid){
    const p=ALL.find(x=>x.id===pid);if(!p||!p.audio)return;
    if(p.type==='write'&&ST[pid]){
      const placed=ST[pid].pl.map(n=>{const full=n.note.slice(0,-1)+(n.acc||'')+n.note.slice(-1);return full;});
      const all=[...(p.given||[]),...placed];
      // 루트(given) 먼저 → 전체 순차
      if(p.given&&p.given.length){pnote(freq(p.given[0]),0,.7);setTimeout(()=>{play(all);flash(all);},500);}
      else{play(all);flash(all);}
    }else if((p.ch===7||p.ch===8||p.ch===9)&&p.type==='mc'&&p.audio.length>1){
      // 루트음 먼저 → 화음 전체
      pnote(freq(p.audio[0]),0,.7);
      setTimeout(()=>{playchord(p.audio);flash(p.audio);},600);
    }else if(p.type==='write'&&p.given&&p.given.length&&p.audio.length>1){
      pnote(freq(p.given[0]),0,.7);
      setTimeout(()=>{play(p.audio);flash(p.audio);},500);
    }else{play(p.audio);flash(p.audio);}
  },
  sa(pid,acc){if(ST[pid])ST[pid].sa=acc;rProbs();},
  nt(pid){
    const inp=document.getElementById('ni_'+pid);if(!inp)return;
    const p=ALL.find(x=>x.id===pid);if(!p)return;
    const s=ST[pid];if(!s)return;
    const parts=inp.value.trim().split(/[\s,]+/).filter(Boolean);
    if(!parts.length)return;
    s.pl=[];
    const gx=(p.givenX||80),gc=(p.given||[]).length;
    let vi=0;
    parts.forEach(nn=>{
      if(!pn(nn.trim()))return;
      s.pl.push({note:nn.trim(),acc:'',x:gx+gc*40+vi*40,color:'#2563eb',style:'whole'});
      vi++;
    });
    reIS(pid,s.cl,p.given||[],p.givenX||80);
    setActive(pid);inp.value='';
  },
  cl(pid){if(ST[pid])ST[pid].pl=[];rProbs();},
  ck(pid){
    const p=ALL.find(x=>x.id===pid);if(!p)return;
    const el=document.getElementById('ai_'+pid);
    const fb=document.getElementById('fb_'+pid);
    const ans=(el?el.value:'').trim();
    let ok=false;
    if(p.check)ok=p.check(ans);
    else{const a=ans.toLowerCase(),b=(p.ans||'').toLowerCase();ok=a===b||a.includes(b)||b.includes(a);}
    if(ok){
      fb.className='fb fok';fb.textContent='✓ '+(LG==='ko'?'정답!':'Correct!');
      DONE[pid]=true;this.sp();rSB();setTimeout(()=>this.next(),700);
    }else{
      fb.className='fb fno';fb.textContent=(LG==='ko'?'✗ 정답: ':'✗ Answer: ')+(p.showAns||p.ans||'');
    }
  },
  cm(pid,ans,btn){
    const p=ALL.find(x=>x.id===pid);if(!p)return;
    const a1=ans.toLowerCase().trim(),a2=(p.ans||p.lbl||'').toLowerCase().trim();
    const ok=a1===a2||a1.includes(a2)||a2.includes(a1);
    btn.className='mo '+(ok?'ok':'bad');
    const fb=document.getElementById('fb_'+pid);
    if(ok){
      fb.className='fb fok';fb.textContent='✓ '+(LG==='ko'?'정답!':'Correct!');
      DONE[pid]=true;this.sp();rSB();setTimeout(()=>this.next(),600);
    }else{
      fb.className='fb fno';fb.textContent=(LG==='ko'?'✗ 정답: ':'✗ Answer: ')+(p.lbl||p.ans||'');
    }
  },
  cw(pid){
    const s=ST[pid],p=ALL.find(x=>x.id===pid);if(!p||!s)return;
    const fb=document.getElementById('fb_'+pid);
    if(!s.pl.length){fb.className='fb fin';fb.textContent=LG==='ko'?'오선을 클릭해서 음표를 배치하세요.':'Click the staff to place notes.';return;}
    const pMid=s.pl.map(n=>{const full=n.note.slice(0,-1)+(n.acc||'')+n.note.slice(-1);return midi(full)||midi(n.note);}).filter(Boolean);
    const aMid=(p.ans||[]).map(n=>midi(n)).filter(Boolean);
    const gMid=(p.given||[]).map(n=>midi(n)).filter(Boolean);
    const need=aMid.filter(m=>!gMid.includes(m));
    const ok=need.length>0&&need.every(m=>pMid.includes(m));
    if(ok){
      fb.className='fb fok';fb.textContent='✓ '+(LG==='ko'?'정답!':'Correct!');
      s.pl=s.pl.map(n=>({...n,color:'#16a34a'}));
      reIS(pid,s.cl,p.given,p.givenX);
      DONE[pid]=true;this.sp();rSB();
      play(p.ans||[]);flash(p.ans||[]);
      setTimeout(()=>this.next(),1800);
    }else{
      fb.className='fb fno';fb.textContent=(LG==='ko'?'✗ 정답: ':'✗ Answer: ')+(p.ans||[]).join(', ');
      s.pl=s.pl.map(n=>({...n,color:'#dc2626'}));
      reIS(pid,s.cl,p.given,p.givenX);
    }
  },
  sh(pid){
    const p=ALL.find(x=>x.id===pid);if(!p)return;
    const fb=document.getElementById('fb_'+pid);
    fb.className='fb fin';fb.textContent=(LG==='ko'?'💡 정답: ':'💡 Answer: ')+(Array.isArray(p.ans)?p.ans.join(', '):p.ans||'');
  },
  csl(pid){
    const p=ALL.find(x=>x.id===pid);if(!p)return;
    const s=ST[pid];if(!s)return;
    const fb=document.getElementById('fb_'+pid);
    if(!s.sel||s.sel.size===0){fb.className='fb fin';fb.textContent=LG==='ko'?'음표를 클릭해서 선택하세요.':'Click notes to select.';return;}
    const ns=p.ns||s.ns||[];
    const selMidi=[...s.sel].map(i=>ns[i]).map(n=>midi(n)).filter(Boolean).sort((a,b)=>a-b);
    const ansMidi=(p.ansMidi||[]).slice().sort((a,b)=>a-b);
    const ok=selMidi.length===ansMidi.length&&selMidi.every((m,i)=>m===ansMidi[i]);
    if(ok){
      fb.className='fb fok';fb.textContent='\u2713 '+(LG==='ko'?'정답!':'Correct!');
      DONE[pid]=true;this.sp();rSB();
      play(p.audio||[]);flash(p.audio||[]);
    }else{
      fb.className='fb fno';fb.textContent=(LG==='ko'?'\u2717 정답: ':'\u2717 Answer: ')+(p.ans||'');
    }
  },
  clsl(pid){
    if(ST[pid])ST[pid].sel=new Set();
    const p=ALL.find(x=>x.id===pid);
    if(p)reSL(pid,p.ns||ST[pid].ns||[],(ST[pid]&&ST[pid].cl)||'treble');
  },
  sp(){try{localStorage.setItem('bhw2',JSON.stringify(DONE));}catch(e){}},
  lp(){try{const d=JSON.parse(localStorage.getItem('bhw2')||'{}');Object.assign(DONE,d);rSB();}catch(e){}},
};

document.addEventListener('DOMContentLoaded',()=>A.init());
</script>
</body>
